name: KiCAD client packaging

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # ------------------------------------------------------------
  # Shared cache key generator (prevents race conditions)
  # ------------------------------------------------------------
  warm_cache:
    runs-on: windows-2022
    outputs:
      cache-key: ${{ steps.set.outputs.cache_key }}
    steps:
      - id: set
        run: echo "cache_key=package-downloaded-${{ github.run_id }}" >> $env:GITHUB_OUTPUT

  # ------------------------------------------------------------
  # FULL INSTALLER PACKAGE
  # ------------------------------------------------------------
  create_full_package:
    runs-on: windows-2022
    needs: warm_cache

    steps:
      - name: Get latest tag
        uses: oprypin/find-latest-tag@v1
        with:
          repository: Huaqiu-Electronics/kicad-win-builder
          releases-only: true
        id: latest-release

      - name: Checkout repo
        uses: actions/checkout@v3

      # ---------------- CACHE (RESTORE) ----------------
      - name: Restore downloaded cache
        uses: actions/cache/restore@v4
        with:
          key: ${{ needs.warm_cache.outputs.cache-key }}
          restore-keys: |
            package-downloaded-
          path: |
            .downloads
            .support

      - name: Restore vcpkg cache
        uses: actions/cache/restore@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-${{ runner.os }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      # ---------------- BUILD ----------------
      - name: Configure
        run: ./build.ps1 -Config -UseMsvcCmake $False

      - name: Init tools
        run: ./build.ps1 -Init

      - name: Setup env
        run: ./build.ps1 -Env -Arch x64

      - name: Build vcpkg deps
        run: ./build.ps1 -Vcpkg -Latest -Arch x64

      - name: Build
        run: ./build.ps1 -Build -Latest -Arch x64 -BuildType Release

      - name: Prepare package
        run: ./build.ps1 -PreparePackage -Arch x64 -BuildType Release

      - name: Package (NSIS)
        run: ./build.ps1 -Package -PackType Nsis -Arch x64 -BuildType Release -DebugSymbols

      # ---------------- CACHE (SAVE) ----------------
      - name: Save downloaded cache
        if: always()
        uses: actions/cache/save@v4
        with:
          key: ${{ needs.warm_cache.outputs.cache-key }}
          path: |
            .downloads
            .support

      - name: Save vcpkg cache
        if: always()
        uses: actions/cache/save@v4
        with:
          key: vcpkg-${{ runner.os }}
          path: C:\Users\runneradmin\AppData\Local\vcpkg\archives

      # ---------------- UPLOAD ----------------
      - name: Upload installer
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.HUAQIU_ELECTRONICS_TOKEN }}
          file: ./.out/kicad-huaqiu-${{ steps.latest-release.outputs.tag }}-x86_64.exe
          asset_name: kicad-huaqiu-${{ steps.latest-release.outputs.tag }}-x86_64.exe
          overwrite: true
          tag: ${{ steps.latest-release.outputs.tag }}

      - name: Upload pdbs
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.HUAQIU_ELECTRONICS_TOKEN }}
          file: ./.out/kicad-huaqiu-${{ steps.latest-release.outputs.tag }}-x86_64-pdbs.zip
          asset_name: kicad-huaqiu-${{ steps.latest-release.outputs.tag }}-x86_64-pdbs.zip
          overwrite: true
          tag: ${{ steps.latest-release.outputs.tag }}

      - name: Upload vcpkg pdbs
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.HUAQIU_ELECTRONICS_TOKEN }}
          file: ./.out/kicad-huaqiu-${{ steps.latest-release.outputs.tag }}-x86_64-vcpkg-pdbs.zip
          asset_name: kicad-huaqiu-${{ steps.latest-release.outputs.tag }}-x86_64-vcpkg-pdbs.zip
          overwrite: true
          tag: ${{ steps.latest-release.outputs.tag }}

  # ------------------------------------------------------------
  # PORTABLE PACKAGE
  # ------------------------------------------------------------
  create_portable_package:
    runs-on: windows-2022
    needs: warm_cache

    steps:
      - name: Get latest tag
        uses: oprypin/find-latest-tag@v1
        with:
          repository: Huaqiu-Electronics/kicad-win-builder
          releases-only: true
        id: latest-release

      - name: Checkout repo
        uses: actions/checkout@v3

      # ---------------- CACHE (RESTORE) ----------------
      - name: Restore downloaded cache
        uses: actions/cache/restore@v4
        with:
          key: ${{ needs.warm_cache.outputs.cache-key }}
          restore-keys: |
            package-downloaded-
          path: |
            .downloads
            .support

      - name: Restore vcpkg cache
        uses: actions/cache/restore@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-${{ runner.os }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      # ---------------- BUILD ----------------
      - name: Configure
        run: ./build.ps1 -Config -UseMsvcCmake $False

      - name: Init tools
        run: ./build.ps1 -Init

      - name: Setup env
        run: ./build.ps1 -Env -Arch x64

      - name: Build vcpkg deps
        run: ./build.ps1 -Vcpkg -Latest -Arch x64

      - name: Build (portable)
        run: ./build.ps1 -Build -Latest -Arch x64 -BuildType Release -Portable

      - name: Prepare package
        run: ./build.ps1 -PreparePackage -Arch x64 -BuildType Release -Portable

      - name: Package (ZIP)
        run: ./build.ps1 -Package -Arch x64 -BuildType Release -Portable

      # ---------------- CACHE (SAVE) ----------------
      - name: Save downloaded cache
        if: always()
        uses: actions/cache/save@v4
        with:
          key: ${{ needs.warm_cache.outputs.cache-key }}
          path: |
            .downloads
            .support

      - name: Save vcpkg cache
        if: always()
        uses: actions/cache/save@v4
        with:
          key: vcpkg-${{ runner.os }}
          path: C:\Users\runneradmin\AppData\Local\vcpkg\archives

      # ---------------- UPLOAD ----------------
      - name: Upload portable zip
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.HUAQIU_ELECTRONICS_TOKEN }}
          file: ./.out/kicad-huaqiu-${{ steps.latest-release.outputs.tag }}-x86_64.zip
          asset_name: kicad-huaqiu-${{ steps.latest-release.outputs.tag }}-x86_64.zip
          overwrite: true
          tag: ${{ steps.latest-release.outputs.tag }}